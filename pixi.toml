[workspace]
name = "neiroha-gpt-sovits"
channels = ["conda-forge"]
platforms = ["win-64"]
requires-pixi = ">=0.61.0"


[tasks]
submodule-init = { cmd = "git submodule update --init --recursive" }
install-deps = { cmd = "python scripts/install_gpt_sovits_deps.py" }
install-assets = { cmd = "python scripts/download_assets.py --source modelscope" }
install-base = { cmd = "python scripts/download_assets.py --source modelscope" }
install = { depends-on = ["submodule-init", "install-deps", "install-assets"] }
install-sample-voice = { cmd = "python scripts/download_assets.py --source hf --skip-base-assets --sample-reference --activate-voices" }
api = { cmd = "python scripts/launch_engine.py --surface api" }
admin = { cmd = "python scripts/launch_engine.py --surface admin" }
serve = { cmd = "python scripts/launch_engine.py" }
test = { cmd = "python -m unittest discover tests" }
smoke = { cmd = "python scripts/smoke_test_api.py" }
launcher-help = { cmd = "python scripts/launch_gpt_sovits.py --help" }


[system-requirements]
cuda = "12.8"

[dependencies]
python = "3.11.*"
pip = "*"
ffmpeg = "*"
cmake = "*"

[pypi-dependencies]
fastapi = { version = ">=0.115.2,<0.116", extras = ["standard"] }
starlette = ">=0.37.2,<0.41"
uvicorn = { version = ">=0.32,<1", extras = ["standard"] }
python-multipart = ">=0.0.20,<1"
gradio = "<5"
huggingface-hub = ">=0.26,<0.36"
hf-xet = ">=1.1,<2"
numpy = "<2.0"
soundfile = ">=0.12,<1"
pydantic = "<=2.10.6"
requests = ">=2.32,<3"

[target.win-64.pypi-dependencies]
torch = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torch-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl" }
torchaudio = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torchaudio-2.7.0%2Bcu128-cp311-cp311-win_amd64.whl" }
torchvision = { url = "https://mirrors.aliyun.com/pytorch-wheels/cu128/torchvision-0.22.0%2Bcu128-cp311-cp311-win_amd64.whl" }